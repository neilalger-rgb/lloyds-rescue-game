<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lloyd's Lair Rescue</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a; display: flex;
            justify-content: center; align-items: center; height: 100vh;
            color: white; font-family: sans-serif;
        }
        canvas { background-color: #333; border: 4px solid #555; }
    </style>
</head>
<body>

    <div>
        <h1>Lloyd's Lair Rescue</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <p>Use the <b>Left/Right Arrows</b> to run, and the <b>Up Arrow</b> to jump!</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let levelWidth = 2400; 
        let currentLevel = 1;
        let gameWon = false;
        const camera = { x: 0 };

        // Lloyd's Stats
        let lloyd = {
            x: 50, y: 300, width: 50, height: 50, color: "#00aaff", 
            speed: 6, dx: 0, dy: 0, gravity: 0.6, jumpPower: -13, grounded: false,
            hasRocketFist: false, hasShield: false, hasMech: false
        };

        const keys = { right: false, left: false, up: false };

        // Game Objects
        let platforms = []; let questionBox = {}; let wall = {}; let verticalLaser = {}; 
        let computer = {}; let cage = {}; let friends = []; let portal = {}; 
        let spikeBalls = []; let sideLasers = []; 
        let groundRobots = []; let birdRobots = []; let enemyLasers = []; let boss = {};

        // --- LEVEL 1 SETUP ---
        function loadLevel1() {
            currentLevel = 1;
            lloyd = { x: 50, y: 300, width: 50, height: 50, color: "#00aaff", speed: 6, dx: 0, dy: 0, gravity: 0.6, jumpPower: -13, grounded: false };
            platforms = [ {x: 0, y: 350, w: 2400, h: 50} ]; 
            questionBox = { x: 400, y: 180, w: 50, h: 50, active: true, type: "fist" };
            wall = { x: 900, y: 150, w: 50, h: 200, active: true };
            verticalLaser = { x: 1300, y: 200, w: 10, h: 150, active: true, speed: 5, dir: 1 };
            computer = { x: 1600, y: 300, w: 40, h: 50, hacked: false };
            cage = { x: 2100, y: 200, w: 150, h: 150, active: true };
            friends = [ { x: 2120, y: 300, w: 40, h: 50, color: "#9900ff" }, { x: 2180, y: 300, w: 40, h: 50, color: "#00ff99" } ];
            portal = { x: 2300, y: 200, w: 60, h: 100, active: false };
            groundRobots = []; birdRobots = []; enemyLasers = []; boss = { active: false };
        }

        // --- LEVEL 2 SETUP ---
        function loadLevel2() {
            currentLevel = 2;
            lloyd = { x: 50, y: 300, width: 50, height: 50, color: "#00aaff", speed: 6, dx: 0, dy: 0, gravity: 0.6, jumpPower: -13, grounded: false };
            platforms = [ {x: 0, y: 350, w: 600, h: 50}, {x: 800, y: 350, w: 600, h: 50}, {x: 1600, y: 350, w: 800, h: 50} ];
            questionBox = { x: 300, y: 180, w: 50, h: 50, active: true, type: "shield" };
            spikeBalls = [ {x: 700, y: -100, r: 20, speed: 4}, {x: 1200, y: -50, r: 20, speed: 5}, {x: 1500, y: -200, r: 20, speed: 6} ];
            sideLasers = [ {x: 900, y: 320, w: 40, h: 10, speed: 4, dir: 1, minX: 850, maxX: 1300} ];
            
            cage = { x: 2100, y: 200, w: 150, h: 150, active: true };
            friends = [ { x: 2120, y: 300, w: 40, h: 50, color: "#ff8800" }, { x: 2180, y: 300, w: 40, h: 50, color: "#ff0088" } ]; 
            portal = { x: 2300, y: 200, w: 60, h: 100, active: false }; 
            
            wall = { active: false }; verticalLaser = { active: false }; computer = { active: false };
        }

        // --- LEVEL 3 SETUP ---
        function loadLevel3() {
            currentLevel = 3;
            lloyd = { x: 50, y: 300, width: 50, height: 50, color: "#00aaff", speed: 6, dx: 0, dy: 0, gravity: 0.6, jumpPower: -13, grounded: false };
            platforms = [ {x: 0, y: 350, w: 2400, h: 50} ]; 
            questionBox = { x: 300, y: 180, w: 50, h: 50, active: true, type: "mech" };
            enemyLasers = [];
            
            groundRobots = [
                {x: 800, y: 300, w: 50, h: 50, timer: 0, active: true},
                {x: 1300, y: 300, w: 50, h: 50, timer: 30, active: true}
            ];
            
            birdRobots = [
                {x: 1000, y: 100, w: 60, h: 30, timer: 0, flySpeed: 2, dir: 1, active: true},
                {x: 1600, y: 80, w: 60, h: 30, timer: 45, flySpeed: 3, dir: -1, active: true}
            ];

            // FIXED: The Boss is now shorter (Height: 120 instead of 200)!
            boss = { x: 2100, y: 230, w: 120, h: 120, active: true, timer: 0, hp: 1 };
            
            spikeBalls = []; sideLasers = []; cage = { active: false }; friends = []; portal = { active: false };
        }

        loadLevel1();

        document.addEventListener("keydown", function(event) {
            if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = true;
            if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = true;
            if ((event.code === "ArrowUp" || event.code === "Space") && lloyd.grounded) {
                lloyd.dy = lloyd.jumpPower; lloyd.grounded = false;
            }
        });
        document.addEventListener("keyup", function(event) {
            if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = false;
            if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = false;
        });

        function isTouching(r1, r2) {
            return r1.x < r2.x + (r2.width || r2.w) && r1.x + lloyd.width > r2.x &&
                   r1.y < r2.y + (r2.height || r2.h) && r1.y + lloyd.height > r2.y;
        }

        function update() {
            if (gameWon) return;

            if (keys.right) lloyd.dx = lloyd.speed; 
            else if (keys.left) lloyd.dx = -lloyd.speed; 
            else lloyd.dx = 0; 

            lloyd.dy += lloyd.gravity;
            lloyd.x += lloyd.dx; lloyd.y += lloyd.dy;

            lloyd.grounded = false;
            for (let plat of platforms) {
                if (lloyd.x < plat.x + plat.w && lloyd.x + lloyd.width > plat.x &&
                    lloyd.y + lloyd.height >= plat.y && lloyd.y + lloyd.height <= plat.y + 20 && lloyd.dy >= 0) {
                    lloyd.y = plat.y - lloyd.height; lloyd.dy = 0; lloyd.grounded = true;
                }
            }

            if (lloyd.y > 600) { currentLevel === 1 ? loadLevel1() : loadLevel2(); }
            if (lloyd.x < 0) lloyd.x = 0;
            if (lloyd.x + lloyd.width > levelWidth) lloyd.x = levelWidth - lloyd.width;

            camera.x = lloyd.x - (canvas.width / 2) + (lloyd.width / 2);
            if (camera.x < 0) camera.x = 0;
            if (camera.x > levelWidth - canvas.width) camera.x = levelWidth - canvas.width;

            if (questionBox.active && isTouching(lloyd, questionBox)) {
                questionBox.active = false; 
                if (questionBox.type === "fist") { lloyd.hasRocketFist = true; lloyd.color = "#ff7700"; }
                if (questionBox.type === "shield") { lloyd.hasShield = true; lloyd.color = "#cccccc"; }
                if (questionBox.type === "mech") { 
                    lloyd.hasMech = true; lloyd.color = "#555555"; 
                    lloyd.width = 80; lloyd.height = 80; lloyd.y -= 30; 
                }
            }

            if (cage.active && isTouching(lloyd, cage)) {
                if (currentLevel === 1 && computer.hacked) { cage.active = false; portal.active = true; } 
                else if (currentLevel === 1 && lloyd.dx > 0) { lloyd.x = cage.x - lloyd.width; }
                else if (currentLevel === 2) { cage.active = false; portal.active = true; }
            }
            if (portal.active && isTouching(lloyd, portal)) {
                currentLevel === 1 ? loadLevel2() : loadLevel3();
            }

            if (currentLevel === 1) {
                if (wall.active && isTouching(lloyd, wall)) {
                    if (lloyd.hasRocketFist) wall.active = false; else if (lloyd.dx > 0) lloyd.x = wall.x - lloyd.width; 
                }
                if (verticalLaser.active) {
                    verticalLaser.y += verticalLaser.speed * verticalLaser.dir;
                    if (verticalLaser.y + verticalLaser.h >= 350) verticalLaser.dir = -1; else if (verticalLaser.y <= 100) verticalLaser.dir = 1;  
                    if (isTouching(lloyd, verticalLaser)) lloyd.x = verticalLaser.x - 100;
                }
                if (!computer.hacked && isTouching(lloyd, computer)) { computer.hacked = true; verticalLaser.active = false; }
            }

            if (currentLevel === 2) {
                for (let sb of spikeBalls) {
                    sb.y += sb.speed;
                    if (sb.y > 450) sb.y = -50; 
                    let box = {x: sb.x - sb.r, y: sb.y - sb.r, w: sb.r*2, h: sb.r*2};
                    if (isTouching(lloyd, box)) { lloyd.hasShield ? lloyd.x -= 10 : loadLevel1(); }
                }
                for (let sl of sideLasers) {
                    sl.x += sl.speed * sl.dir;
                    if (sl.x > sl.maxX || sl.x < sl.minX) sl.dir *= -1;
                    if (isTouching(lloyd, sl)) lloyd.x = sl.minX - 60; 
                }
            }

            if (currentLevel === 3) {
                for (let gr of groundRobots) {
                    if (!gr.active) continue;
                    gr.timer++;
                    if (gr.timer > 100) { 
                        enemyLasers.push({x: gr.x, y: gr.y + 20, w: 30, h: 5, vx: -5, vy: 0});
                        gr.timer = 0;
                    }
                    if (isTouching(lloyd, gr)) {
                        if (!lloyd.hasMech) loadLevel3(); else gr.active = false; 
                    }
                }

                for (let br of birdRobots) {
                    if (!br.active) continue;
                    br.x += br.flySpeed * br.dir;
                    if (br.x > 1800 || br.x < 800) br.dir *= -1; 
                    br.timer++;
                    if (br.timer > 80) { 
                        enemyLasers.push({x: br.x + 25, y: br.y + 30, w: 10, h: 20, vx: 0, vy: 4});
                        br.timer = 0;
                    }
                    if (isTouching(lloyd, br)) {
                        if (!lloyd.hasMech) loadLevel3(); else br.active = false; 
                    }
                }

                for (let i = enemyLasers.length - 1; i >= 0; i--) {
                    let l = enemyLasers[i];
                    l.x += l.vx; l.y += l.vy;
                    
                    if (isTouching(lloyd, l)) {
                        if (!lloyd.hasMech) {
                            loadLevel3(); // Unarmored hit! 
                        } else {
                            // FIXED: The Laser breaks the Mech Suit!
                            lloyd.hasMech = false;
                            lloyd.color = "#00aaff";
                            lloyd.width = 50;
                            lloyd.height = 50;
                            lloyd.y += 30; // Drop Lloyd down slightly so he doesn't float
                            enemyLasers.splice(i, 1); 
                            continue;
                        }
                    }
                    if (l.y > 350 || l.x < camera.x || l.x > camera.x + 800) enemyLasers.splice(i, 1);
                }

                if (boss.active) {
                    boss.timer++;
                    if (boss.timer > 60) { 
                        enemyLasers.push({x: boss.x - 40, y: boss.y + 60, w: 40, h: 10, vx: -6, vy: 0});
                        boss.timer = 0;
                    }

                    if (isTouching(lloyd, boss)) {
                        if (lloyd.dy > 0 && lloyd.y + lloyd.height < boss.y + 40) {
                            boss.active = false; 
                            lloyd.dy = -15; 
                            gameWon = true; 
                        } else {
                            if (!lloyd.hasMech) {
                                loadLevel3(); 
                            } else {
                                if (lloyd.dx > 0) lloyd.x = boss.x - lloyd.width;
                                else if (lloyd.dx < 0) lloyd.x = boss.x + boss.w;
                            }
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-camera.x, 0);

            if (currentLevel === 1) ctx.fillStyle = "#333";
            if (currentLevel === 2) ctx.fillStyle = "#221133";
            if (currentLevel === 3) ctx.fillStyle = "#441111"; 
            ctx.fillRect(0, 0, levelWidth, canvas.height);
            
            ctx.fillStyle = "#555555";
            for (let plat of platforms) ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

            if (questionBox.active) {
                ctx.fillStyle = "#ffcc00"; ctx.fillRect(questionBox.x, questionBox.y, questionBox.w, questionBox.h);
                ctx.fillStyle = "black"; ctx.font = "bold 30px Arial"; ctx.fillText("?", questionBox.x + 15, questionBox.y + 35);
            }

            friends.forEach(f => { ctx.fillStyle = f.color; ctx.fillRect(f.x, f.y, f.w, f.h); });
            if (cage.active) { 
                ctx.fillStyle = "rgba(150, 150, 150, 0.5)"; ctx.fillRect(cage.x, cage.y, cage.w, cage.h); 
                ctx.fillStyle = "#888"; for(let i = 0; i < 5; i++) ctx.fillRect(cage.x + (i * 35), cage.y, 10, cage.h);
            }
            if (portal.active) { 
                ctx.fillStyle = "#00ffff"; ctx.fillRect(portal.x, portal.y, portal.w, portal.h); 
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.fillText("PORTAL", portal.x - 2, portal.y - 10);
            }

            if (currentLevel === 1) {
                if (wall.active) { ctx.fillStyle = "#aa0000"; ctx.fillRect(wall.x, wall.y, wall.w, wall.h); }
                if (verticalLaser.active) { ctx.fillStyle = "#ff0000"; ctx.fillRect(verticalLaser.x, verticalLaser.y, verticalLaser.w, verticalLaser.h); }
                ctx.fillStyle = computer.hacked ? "#00ff00" : "#005500"; ctx.fillRect(computer.x, computer.y, computer.w, computer.h);
            }
            if (currentLevel === 2) {
                ctx.fillStyle = "gray";
                for (let sb of spikeBalls) {
                    ctx.beginPath(); ctx.arc(sb.x, sb.y, sb.r, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "black"; ctx.fillRect(sb.x - 2, sb.y - 2, 4, 4); ctx.fillStyle = "gray";
                }
                ctx.fillStyle = "#ff00ff"; for (let sl of sideLasers) ctx.fillRect(sl.x, sl.y, sl.w, sl.h);
            }

            if (currentLevel === 3) {
                ctx.fillStyle = "#ff4444";
                for (let gr of groundRobots) {
                    if (!gr.active) continue;
                    ctx.fillRect(gr.x, gr.y, gr.w, gr.h);
                    ctx.fillStyle = "cyan"; ctx.fillRect(gr.x - 5, gr.y + 15, 10, 10); 
                    ctx.fillStyle = "#ff4444";
                }
                ctx.fillStyle = "#99ccff";
                for (let br of birdRobots) {
                    if (!br.active) continue;
                    ctx.fillRect(br.x, br.y, br.w, br.h);
                    ctx.fillStyle = "white"; ctx.fillRect(br.x + 20, br.y + 10, 20, 10); 
                    ctx.fillStyle = "#99ccff";
                }
                ctx.fillStyle = "red";
                for (let l of enemyLasers) ctx.fillRect(l.x, l.y, l.w, l.h);

                if (boss.active) {
                    ctx.fillStyle = "#111"; 
                    ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                    ctx.fillStyle = "red"; ctx.fillRect(boss.x + 10, boss.y + 20, 40, 20); 
                    ctx.fillStyle = "gray"; ctx.fillRect(boss.x - 20, boss.y + 50, 40, 30); // Adjusted cannon arm
                }
            }

            ctx.fillStyle = lloyd.color; ctx.fillRect(lloyd.x, lloyd.y, lloyd.width, lloyd.height);
            if (lloyd.hasMech) {
                ctx.fillStyle = "cyan"; ctx.fillRect(lloyd.x + 20, lloyd.y + 20, lloyd.width - 40, 20); 
            }

            ctx.restore(); 

            ctx.fillStyle = "white"; ctx.font = "20px Arial";
            ctx.fillText("Level " + currentLevel, 20, 30);
            
            if (gameWon) {
                ctx.fillStyle = "#00ff00"; ctx.font = "bold 40px Arial";
                ctx.fillText("BOSS DEFEATED! YOU WIN THE GAME!", 50, 200);
            } else if (currentLevel === 3 && !lloyd.hasMech) {
                ctx.fillText("Dodge the robots! Get the Mech Suit from the ? block!", 100, 30);
            } else if (currentLevel === 3 && boss.active) {
                ctx.fillText("MECH SUIT ACTIVE! Watch out, lasers will break your armor!", 100, 30);
            }
        }

        function gameLoop() {
            update(); draw(); requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>

</body>
</html>
