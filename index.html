<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lloyd's Lair Rescue</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #333; 
            border: 4px solid #555;
        }
    </style>
</head>
<body>

    <div>
        <h1>Lloyd's Lair Rescue</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <p>Use the <b>Left/Right Arrows</b> to run, and the <b>Up Arrow</b> to jump!</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Lloyd's Stats
        const lloyd = {
            x: 50,
            y: 300,
            width: 50,
            height: 50,
            color: "#00aaff", 
            speed: 5,        
            dx: 0,           
            dy: 0,           
            gravity: 0.6,    
            jumpPower: -12,  
            grounded: false,
            hasRocketFist: false 
        };

        // The ? Block
        const questionBox = {
            x: 250,
            y: 180,
            width: 50,
            height: 50,
            active: true
        };

        // The Giant Wall
        const wall = {
            x: 500,
            y: 150,
            width: 50,
            height: 200,
            active: true
        };

        // NEW: The Moving Laser Beam
        const laser = {
            x: 600,
            y: 200,
            width: 10,
            height: 150,
            active: true,
            speed: 4,
            direction: 1 // 1 makes it go down, -1 makes it go up
        };

        // NEW: The Hacking Computer
        const computer = {
            x: 720,
            y: 300,
            width: 40,
            height: 50,
            hacked: false
        };

        const keys = { right: false, left: false, up: false };

        document.addEventListener("keydown", function(event) {
            if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = true;
            if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = true;
            if ((event.code === "ArrowUp" || event.code === "Space") && lloyd.grounded) {
                lloyd.dy = lloyd.jumpPower;
                lloyd.grounded = false;
            }
        });

        document.addEventListener("keyup", function(event) {
            if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = false;
            if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = false;
        });

        function isTouching(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            // Movement
            if (keys.right) { lloyd.dx = lloyd.speed; }
            else if (keys.left) { lloyd.dx = -lloyd.speed; }
            else { lloyd.dx = 0; }

            lloyd.dy += lloyd.gravity;
            lloyd.x += lloyd.dx;
            lloyd.y += lloyd.dy;

            // Floor logic
            const floorY = 350;
            if (lloyd.y + lloyd.height >= floorY) {
                lloyd.y = floorY - lloyd.height;
                lloyd.dy = 0;
                lloyd.grounded = true;
            }

            // Screen boundaries
            if (lloyd.x < 0) lloyd.x = 0;
            if (lloyd.x + lloyd.width > canvas.width) lloyd.x = canvas.width - lloyd.width;

            // Touching the ? Block
            if (questionBox.active && isTouching(lloyd, questionBox)) {
                questionBox.active = false; 
                lloyd.hasRocketFist = true; 
                lloyd.color = "#ff7700";    
            }

            // Touching the Giant Wall
            if (wall.active && isTouching(lloyd, wall)) {
                if (lloyd.hasRocketFist) {
                    wall.active = false; 
                } else {
                    if (lloyd.dx > 0) {
                        lloyd.x = wall.x - lloyd.width; 
                    }
                }
            }

            // NEW: Move the Laser
            if (laser.active) {
                laser.y += laser.speed * laser.direction;
                // Bounce the laser up and down
                if (laser.y + laser.height >= floorY) {
                    laser.direction = -1; // Go up
                } else if (laser.y <= 100) {
                    laser.direction = 1;  // Go down
                }
            }

            // NEW: Touching the Laser (ZAP!)
            if (laser.active && isTouching(lloyd, laser)) {
                // Bounce Lloyd back to safety so he can try dodging again!
                lloyd.x = 520;
            }

            // NEW: Touching the Computer (HACK IT!)
            if (!computer.hacked && isTouching(lloyd, computer)) {
                computer.hacked = true;
                laser.active = false; // The laser disappears!
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background & Floor
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#555555";
            ctx.fillRect(0, 350, 800, 50);

            // Draw ? Block
            if (questionBox.active) {
                ctx.fillStyle = "#ffcc00"; 
                ctx.fillRect(questionBox.x, questionBox.y, questionBox.width, questionBox.height);
                ctx.fillStyle = "black";
                ctx.font = "bold 30px Arial";
                ctx.fillText("?", questionBox.x + 15, questionBox.y + 35);
            }

            // Draw Wall
            if (wall.active) {
                ctx.fillStyle = "#aa0000"; 
                ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            }

            // NEW: Draw Laser
            if (laser.active) {
                ctx.fillStyle = "#ff0000"; // Danger Red!
                ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
            }

            // NEW: Draw Computer
            if (computer.hacked) {
                ctx.fillStyle = "#00ff00"; // Safe Green!
            } else {
                ctx.fillStyle = "#005500"; // Dark Green
            }
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            // Draw a little screen on the computer
            ctx.fillStyle = "black";
            ctx.fillRect(computer.x + 5, computer.y + 5, computer.width - 10, computer.height - 20);

            // Draw Lloyd
            ctx.fillStyle = lloyd.color;
            ctx.fillRect(lloyd.x, lloyd.y, lloyd.width, lloyd.height);

            // Game Instructions Text
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            if (!lloyd.hasRocketFist) {
                ctx.fillText("Hit the ? block to get the Rocket Fist!", 20, 30);
            } else if (!computer.hacked) {
                ctx.fillText("Smash the wall, dodge the laser, and hack the computer!", 20, 30);
            } else {
                ctx.fillText("SYSTEM HACKED! The laser is off! You are a ninja!", 20, 30);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>

</body>
</html>
