<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lloyd's Lair Rescue</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #333; 
            border: 4px solid #555;
        }
    </style>
</head>
<body>

    <div>
        <h1>Lloyd's Lair Rescue</h1>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <p>Use the <b>Left/Right Arrows</b> to run, and the <b>Up Arrow</b> to jump!</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const levelWidth = 2400; 
        const camera = { x: 0 };

        // Lloyd's Stats
        const lloyd = {
            x: 50,
            y: 300,
            width: 50,
            height: 50,
            color: "#00aaff", 
            speed: 6,       
            dx: 0,           
            dy: 0,           
            gravity: 0.6,    
            jumpPower: -12,  
            grounded: false,
            hasRocketFist: false 
        };

        const questionBox = { x: 400, y: 180, width: 50, height: 50, active: true };
        const wall = { x: 900, y: 150, width: 50, height: 200, active: true };
        const laser = { x: 1300, y: 200, width: 10, height: 150, active: true, speed: 5, direction: 1 };
        const computer = { x: 1600, y: 300, width: 40, height: 50, hacked: false };
        
        const cage = { x: 2100, y: 200, width: 150, height: 150, active: true };
        const friends = [
            { x: 2120, y: 300, width: 40, height: 50, color: "#9900ff" }, 
            { x: 2180, y: 300, width: 40, height: 50, color: "#00ff99" }  
        ];
        
        // NEW: The Escape Portal!
        const portal = { x: 2300, y: 200, width: 60, height: 100, active: false };
        
        let gameWon = false;
        let inPortal = false; // Checks if Lloyd jumped in!

        const keys = { right: false, left: false, up: false };

        document.addEventListener("keydown", function(event) {
            if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = true;
            if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = true;
            if ((event.code === "ArrowUp" || event.code === "Space") && lloyd.grounded) {
                lloyd.dy = lloyd.jumpPower;
                lloyd.grounded = false;
            }
        });

        document.addEventListener("keyup", function(event) {
            if (event.code === "ArrowRight" || event.code === "KeyD") keys.right = false;
            if (event.code === "ArrowLeft" || event.code === "KeyA") keys.left = false;
        });

        function isTouching(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function update() {
            if (inPortal) return; // Stop the game completely if we are warping!

            // Movement
            if (keys.right) { lloyd.dx = lloyd.speed; }
            else if (keys.left) { lloyd.dx = -lloyd.speed; }
            else { lloyd.dx = 0; }

            lloyd.dy += lloyd.gravity;
            lloyd.x += lloyd.dx;
            lloyd.y += lloyd.dy;

            // Floor logic
            const floorY = 350;
            if (lloyd.y + lloyd.height >= floorY) {
                lloyd.y = floorY - lloyd.height;
                lloyd.dy = 0;
                lloyd.grounded = true;
            }

            if (lloyd.x < 0) lloyd.x = 0;
            if (lloyd.x + lloyd.width > levelWidth) lloyd.x = levelWidth - lloyd.width;

            // Camera Logic
            camera.x = lloyd.x - (canvas.width / 2) + (lloyd.width / 2);
            if (camera.x < 0) camera.x = 0;
            if (camera.x > levelWidth - canvas.width) camera.x = levelWidth - canvas.width;

            // Interactions
            if (questionBox.active && isTouching(lloyd, questionBox)) {
                questionBox.active = false; 
                lloyd.hasRocketFist = true; 
                lloyd.color = "#ff7700";    
            }

            if (wall.active && isTouching(lloyd, wall)) {
                if (lloyd.hasRocketFist) {
                    wall.active = false; 
                } else {
                    if (lloyd.dx > 0) lloyd.x = wall.x - lloyd.width; 
                }
            }

            if (laser.active) {
                laser.y += laser.speed * laser.direction;
                if (laser.y + laser.height >= floorY) laser.direction = -1; 
                else if (laser.y <= 100) laser.direction = 1;  
            }

            if (laser.active && isTouching(lloyd, laser)) {
                lloyd.x = laser.x - 100;
            }

            if (!computer.hacked && isTouching(lloyd, computer)) {
                computer.hacked = true;
                laser.active = false; 
            }

            // Touching the Cage
            if (cage.active && isTouching(lloyd, cage)) {
                if (computer.hacked) {
                    cage.active = false; 
                    gameWon = true;      
                    portal.active = true; // Turn the portal ON!
                } else {
                    if (lloyd.dx > 0) lloyd.x = cage.x - lloyd.width;
                }
            }

            // NEW: Touching the Portal
            if (portal.active && isTouching(lloyd, portal)) {
                inPortal = true; // TRIGGER LEVEL 2 WARP!
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, 0);

            // Draw long background & Floor
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, levelWidth, canvas.height);
            ctx.fillStyle = "#555555";
            ctx.fillRect(0, 350, levelWidth, 50);

            // Draw ? Block
            if (questionBox.active) {
                ctx.fillStyle = "#ffcc00"; 
                ctx.fillRect(questionBox.x, questionBox.y, questionBox.width, questionBox.height);
                ctx.fillStyle = "black";
                ctx.font = "bold 30px Arial";
                ctx.fillText("?", questionBox.x + 15, questionBox.y + 35);
            }

            // Draw Wall
            if (wall.active) {
                ctx.fillStyle = "#aa0000"; 
                ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            }

            // Draw Laser
            if (laser.active) {
                ctx.fillStyle = "#ff0000"; 
                ctx.fillRect(laser.x, laser.y, laser.width, laser.height);
            }

            // Draw Computer
            ctx.fillStyle = computer.hacked ? "#00ff00" : "#005500";
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            ctx.fillStyle = "black";
            ctx.fillRect(computer.x + 5, computer.y + 5, computer.width - 10, computer.height - 20);

            // Draw Robot Friends
            friends.forEach(friend => {
                ctx.fillStyle = friend.color;
                ctx.fillRect(friend.x, friend.y, friend.width, friend.height);
            });

            // Draw Cage
            if (cage.active) {
                ctx.fillStyle = "rgba(150, 150, 150, 0.5)"; 
                ctx.fillRect(cage.x, cage.y, cage.width, cage.height);
                ctx.fillStyle = "#888";
                for(let i = 0; i < 5; i++) {
                    ctx.fillRect(cage.x + (i * 35), cage.y, 10, cage.height);
                }
            }

            // NEW: Draw Portal
            if (portal.active) {
                ctx.fillStyle = "#00ffff"; // Glowing Cyan
                ctx.fillRect(portal.x, portal.y, portal.width, portal.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.fillText("PORTAL", portal.x - 2, portal.y - 10);
            }

            // Draw Lloyd (Unless he is in the portal!)
            if (!inPortal) {
                ctx.fillStyle = lloyd.color;
                ctx.fillRect(lloyd.x, lloyd.y, lloyd.width, lloyd.height);
            }

            ctx.restore(); 

            // HUD / UI TEXT
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            
            if (inPortal) {
                ctx.fillStyle = "#00ffff";
                ctx.font = "bold 40px Arial";
                ctx.fillText("WARPING TO LEVEL 2...", 150, 200);
            } else if (gameWon) {
                ctx.fillStyle = "#00ff00";
                ctx.font = "bold 30px Arial";
                ctx.fillText("ROBOTS RESCUED! ENTER THE PORTAL!", 100, 200);
            } else if (!lloyd.hasRocketFist) {
                ctx.fillText("Explore the lair! Find the ? block!", 20, 30);
            } else if (!computer.hacked) {
                ctx.fillText("Smash the wall, dodge the laser, hack the computer!", 20, 30);
            } else {
                ctx.fillText("SYSTEM HACKED! Run right to rescue the robots!", 20, 30);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>

</body>
</html>
